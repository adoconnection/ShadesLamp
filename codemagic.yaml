workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CI
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.adoconnection.ledlamp
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd app2
          npm ci

      - name: Expo prebuild
        script: |
          cd app2
          npx expo prebuild --platform ios --clean

      - name: Increment build number
        script: |
          cd app2/ios
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" 2>/dev/null || echo 0) + 1))
        working_directory: app2/ios

      - name: Install CocoaPods
        script: |
          cd app2/ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd app2/ios
          xcode-project build-ipa \
            --workspace "ShadesLamp.xcworkspace" \
            --scheme "ShadesLamp"

    artifacts:
      - app2/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          cd app2
          npm ci

      - name: Expo prebuild
        script: |
          cd app2
          npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd app2/android
          ./gradlew assembleRelease

    artifacts:
      - app2/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - adoconnection@gmail.com
